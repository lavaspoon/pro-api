spring:
  flyway:
    enabled: true
    # 기존 스키마만 있고 이력 테이블이 없을 때
    baseline-on-migrate: true
    # PostgreSQL 전용 — 경로: src/main/resources/db/migration
    locations: classpath:db/migration
    # 예전 버전(삭제된) 마이그레이션 파일이 DB 이력에만 남아 있어도 기동 가능
    ignore-missing-migrations: true
    # 이미 적용된 마이그레이션 SQL을 수정하면 체크섬 불일치로 기동 실패함.
    # 로컬에서 SQL을 고친 뒤에는 아래를 false로 두거나, flyway repair / checksum 수동 갱신 후 true 유지.
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  cache:
    type: caffeine
    cache-names: adminDeptScope
    caffeine:
      spec: maximumSize=10,expireAfterWrite=5m

  datasource:
    url: jdbc:postgresql://localhost:5433/ragdb
    username: raguser
    password: ragpass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ragdb-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    # SLF4J(org.hibernate.SQL)로만 SQL 출력 — show-sql 과 중복 방지
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.lob.non_contextual_creation: true

# ─── p6spy (gavlyukovskiy datasource decorator) ──────────────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "%(currentTime) | %(executionTime)ms | %(category) | %(sqlSingleLine)"

# 관리자 대시보드: 2depth 필터 부서 ID·리프 팀 depth (프론트에서 변경 불가)
# leaf-dept-ids-by-second-depth 를 비우면 각 second-depth 하위 전체 서브트리가 스코프.
# 값이 있으면: 키 = 2depth 센터 dept_id, 값 = 그 센터 하위에서 허용할 leaf(5depth) 팀 dept_id.
#   키를 생략한 센터 → 해당 센터는 leaf depth 팀 전체. 키만 있고 [] → 그 센터 leaf 팀 없음.
youpro:
  admin:
    second-depth-dept-ids:
      - 5
      - 6
    leaf-team-depth: 2
    leaf-dept-ids-by-second-depth:
      5:
        - 12
        - 13
      6:
        - 14
        - 15
logging:
  level:
    root: INFO
    devlava.youproapi: DEBUG
    # SQL 문만 (바인딩 파라미터 TRACE는 끔)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    p6spy: INFO
    com.p6spy.engine.spy: INFO

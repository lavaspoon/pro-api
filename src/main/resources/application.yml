spring:
  # в”Җв”Җв”Җ Auto-Config м ңмҷё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Primary / STT л‘җ к°ң DataSourceлҘј мҲҳлҸҷ м„Өм •н•ҳлҜҖлЎң JPA мһҗлҸҷ кө¬м„ұмқҖ л№„нҷңм„ұнҷ”.
  # DataSourceDecoratorAutoConfiguration(p6spy)мқҖ м ңмҷён•ҳм§Җ м•Ҡм•„ SQL лЎңк№… мң м§Җ.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  # в”Җв”Җв”Җ Primary DataSource (ragdb) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5433/ragdb
      username: raguser
      password: ragpass
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: primary-pool
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    # в”Җв”Җв”Җ Secondary DataSource (st_etc / STT) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    stt:
      jdbc-url: jdbc:postgresql://localhost:5433/st_etc
      username: raguser
      password: ragpass
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: stt-pool
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  # в”Җв”Җв”Җ JPA кіөнҶө н”„лЎңнҚјнӢ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  jpa:
    open-in-view: false

# в”Җв”Җв”Җ p6spy (gavlyukovskiy datasource decorator) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# spring.datasource н•ҳмң„к°Җ м•„лӢҢ мөңмғҒмң„ decorator нӮӨлЎң м„Өм •н•ҙм•ј лҸҷмһ‘н•Ё
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "%(currentTime) | %(executionTime)ms | %(category) | %(sqlSingleLine)"

logging:
  level:
    root: INFO
    devlava.youproapi: DEBUG
    # Hibernate SQL м¶ңл Ҙ (p6spy лҜёлҸҷмһ‘ мӢң л°ұм—…мҡ©)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # p6spy мһҗмІҙ лЎңк·ё
    p6spy: INFO
    com.p6spy.engine.spy: INFO

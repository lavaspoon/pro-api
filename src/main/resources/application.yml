spring:
  cache:
    type: caffeine
    cache-names: adminDeptScope
    caffeine:
      spec: maximumSize=10,expireAfterWrite=5m

  datasource:
    url: jdbc:postgresql://localhost:5433/ragdb
    username: raguser
    password: ragpass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ragdb-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    # SLF4J(org.hibernate.SQL)로만 SQL 출력 — show-sql 과 중복 방지
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.lob.non_contextual_creation: true

# ─── p6spy (gavlyukovskiy datasource decorator) ──────────────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "%(currentTime) | %(executionTime)ms | %(category) | %(sqlSingleLine)"

logging:
  level:
    root: INFO
    devlava.youproapi: DEBUG
    # SQL 문만 (바인딩 파라미터 TRACE는 끔)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    p6spy: INFO
    com.p6spy.engine.spy: INFO
